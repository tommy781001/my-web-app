<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專業體脂紀錄 v2.2.1</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text-sec: #8E8E93; --tab-bg: rgba(255,255,255,0.95); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1C1C1E; -webkit-tap-highlight-color: transparent; }
        
        /* 頁面切換機制 */
        .page { display: none; padding: 15px; padding-bottom: calc(110px + env(safe-area-inset-bottom)); min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }

        /* 頂部安全區域與標題 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: calc(env(safe-area-inset-top) + 15px) 5px 0 5px; }
        .header h1 { font-size: 26px; margin: 0; font-weight: bold; }

        /* 卡片與格狀佈局修正 */
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 20px; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 5px; position: relative; }
        .input-group-date { margin-bottom: 25px; } /* 拉大日期與輸入框的距離 */
        label { display: block; font-size: 13px; color: var(--text-sec); margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #FAFAFA; outline: none; }
        input:focus { border-color: var(--primary); background: #FFF; }
        #rec-date { -webkit-appearance: none; appearance: none; } /* iOS 原生樣式優化 */

        /* 按鈕優化 */
        button { padding: 16px; border-radius: 14px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 25px; }
        .btn-export { background: #E5E5EA; color: #3A3A3C; width: 100%; margin-top: 15px; }
        button:active { opacity: 0.7; transform: scale(0.98); }

        /* 底部導覽列修正 (適配安全區域) */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(85px + env(safe-area-inset-bottom)); background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding-top: 15px; border-top: 0.5px solid #C6C6C8; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); font-size: 11px; text-decoration: none; width: 33%; }
        .tab-item.active { color: var(--primary); font-weight: bold; }
        .tab-icon { font-size: 26px; margin-bottom: 6px; }

        /* 圖表與清單 */
        .chart-card { height: 480px; }
        .chart-container { height: calc(100% - 40px); width: 100%; margin-top: 15px; }
        .history-item { background: white; padding: 18px; border-radius: 14px; margin-bottom: 12px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .history-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #F2F2F7; padding-bottom: 10px; }
        .history-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; color: #3A3A3C; }
        
        /* 版本號 */
        .version-tag { text-align: center; color: #C7C7CC; font-size: 11px; margin-top: 30px; }
    </style>
</head>
<body>

<div id="page-input" class="page active">
    <div class="header">
        <h1>新紀錄</h1>
        <div style="display:flex; align-items:center; gap:5px; background:white; padding:8px 12px; border-radius:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
            <label style="font-size:12px; margin:0; color: #1C1C1E;">身高</label>
            <input type="number" id="h" placeholder="cm" style="width:50px; padding:3px; font-size:14px; border:none; background:none; text-align:right;" onchange="ls('h',this.value)">
        </div>
    </div>

    <div class="card">
        <div class="input-group input-group-date">
            <label>📅 紀錄日期 (可補記往日資料)</label>
            <input type="date" id="rec-date">
        </div>
        <div class="grid">
            <div class="input-group"><label>體重 (kg)</label><input type="number" step="0.1" id="w"></div>
            <div class="input-group"><label>體脂肪 (%)</label><input type="number" step="0.1" id="fat"></div>
            <div class="input-group"><label>內臟脂肪</label><input type="number" step="0.5" id="vfat"></div>
            <div class="input-group"><label>骨骼筋 (%)</label><input type="number" step="0.1" id="muscle"></div>
            <div class="input-group"><label>體年齡</label><input type="number" id="age"></div>
            <div class="input-group"><label>基代 (kcal)</label><input type="number" id="bmr"></div>
        </div>
        <button class="btn-save" onclick="save()">儲存數據</button>
    </div>
    
    <div class="version-tag" onclick="location.reload(true)">Build v2.2.1 • 點擊更新介面</div>
</div>

<div id="page-chart" class="page">
    <div class="header"><h1>趨勢分析</h1></div>
    <div class="card chart-card">
        <label>體重變化 (最近10筆)</label>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
</div>

<div id="page-list" class="page">
    <div class="header">
        <h1>歷史紀錄</h1>
        <button onclick="clearData()" style="background:none; color:#FF3B30; font-size:14px; font-weight:normal; padding: 10px;">清空</button>
    </div>
    <div id="history-contents"></div>
    <button class="btn-export" onclick="exportExcel()">匯出 CSV 報表</button>
</div>

<nav class="tab-bar">
    <a href="javascript:void(0)" class="tab-item active" onclick="showPage('input', this)">
        <div class="tab-icon">✍️</div>
        <div>紀錄</div>
    </a>
    <a href="javascript:void(0)" class="tab-item" onclick="showPage('chart', this)">
        <div class="tab-icon">📈</div>
        <div>趨勢</div>
    </a>
    <a href="javascript:void(0)" class="tab-item" onclick="showPage('list', this)">
        <div class="tab-icon">📜</div>
        <div>詳細</div>
    </a>
</nav>

<script>
    const ls = (k,v) => localStorage.setItem(k,v);
    const lg = (k) => localStorage.getItem(k);
    let weightChart;

    window.onload = () => {
        // 初始化身高
        document.getElementById('h').value = lg('h') || '';
        // 預設日期為今天 (格式: YYYY-MM-DD)
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('rec-date').value = today;
        
        initChart();
        renderHistory();
    };

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        if(pageId === 'chart') updateChart();
        if(pageId === 'list') renderHistory();
    }

    function save() {
        const hVal = document.getElementById('h').value;
        const wVal = parseFloat(document.getElementById('w').value);
        const dateVal = document.getElementById('rec-date').value;

        if(!wVal) return alert("請輸入體重");
        if(!hVal) return alert("請填寫身高");

        const data = {
            date: dateVal, // 使用選擇的日期
            displayDate: dateVal.split('-')[1] + '/' + dateVal.split('-')[2], // 顯示用 MM/DD
            w: wVal,
            fat: document.getElementById('fat').value || '--',
            vfat: document.getElementById('vfat').value || '--',
            muscle: document.getElementById('muscle').value || '--',
            age: document.getElementById('age').value || '--',
            bmr: document.getElementById('bmr').value || '--',
            h: hVal,
            bmi: (wVal / ((hVal/100)**2)).toFixed(1)
        };

        let history = JSON.parse(lg('weights') || '[]');
        history.push(data);
        
        // 按日期排序 (由新到舊)
        history.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        ls('weights', JSON.stringify(history));
        
        // 清空輸入並提示
        ['w','fat','vfat','muscle','age','bmr'].forEach(id => document.getElementById(id).value = '');
        alert("資料已儲存於 " + dateVal);
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        weightChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: '體重 (kg)', data: [], borderColor: '#007AFF', tension: 0.4, fill: true, backgroundColor: 'rgba(0,122,255,0.08)', pointRadius: 5, pointBackgroundColor: '#007AFF', pointBorderColor: '#FFF', pointBorderWidth: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, grid: { color: '#E5E5EA' } }, x: { grid: { display: false } } } }
        });
    }

    function updateChart() {
        // 抓取最近 10 筆並按日期正向排序顯示在圖表
        const history = JSON.parse(lg('weights') || '[]').slice(0, 10).reverse();
        weightChart.data.labels = history.map(i => i.displayDate);
        weightChart.data.datasets[0].data = history.map(i => i.w);
        weightChart.update();
    }

    function renderHistory() {
        const history = JSON.parse(lg('weights') || '[]');
        const container = document.getElementById('history-contents');
        container.innerHTML = history.length ? '' : '<p style="text-align:center; color:#8E8E93; margin-top:50px;">無歷史紀錄</p>';
        history.forEach(i => {
            container.innerHTML += `
                <div class="history-item">
                    <div class="history-header"><span>📅 ${i.date}</span><span style="color:var(--primary)">${i.w} kg</span></div>
                    <div class="history-grid">
                        <span>BMI: ${i.bmi}</span><span>體脂: ${i.fat}%</span><span>內臟: ${i.vfat}</span>
                        <span>肌肉: ${i.muscle}%</span><span>體年齡: ${i.age}</span><span>基代: ${i.bmr}</span>
                    </div>
                </div>`;
        });
    }

    function exportExcel() {
        const history = JSON.parse(lg('weights') || '[]');
        if(!history.length) return alert("尚無數據");
        let csv = "\uFEFF日期,體重(kg),BMI,體脂肪(%),內臟脂肪,骨骼筋率(%),體年齡,基礎代謝(kcal)\n";
        history.forEach(i => csv += `${i.date},${i.w},${i.bmi},${i.fat},${i.vfat},${i.muscle},${i.age},${i.bmr}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `體組成報表_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function clearData() { if(confirm("確定永久刪除所有紀錄？這操作無法還原。")) { ls('weights', '[]'); renderHistory(); } }
</script>

</body>
</html>
