<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>體重紀錄</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="體重紀錄">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui; background: var(--bg); margin: 0; padding: 20px; color: #1C1C1E; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 20px; color: #000; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #8E8E93; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #D1D1D6; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 0.5px solid #D1D1D6; }
        .history-item:last-child { border-bottom: none; }
        .weight-val { font-size: 18px; font-weight: 600; }
        .date-val { font-size: 14px; color: #8E8E93; }
        .bmi-tag { font-size: 12px; background: #E5E5EA; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>體重紀錄</h1>
    
    <div class="card">
        <div class="input-group">
            <label>身高 (cm)</label>
            <input type="number" id="height" placeholder="例如: 175" onchange="saveHeight()">
        </div>
        <div class="input-group">
            <label>今日體重 (kg)</label>
            <input type="number" step="0.1" id="weight" placeholder="0.0">
        </div>
        <button onclick="addRecord()">記錄體重</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="margin:0; font-size:18px;">歷史趨勢</h2>
            <button onclick="clearAll()" style="width:auto; padding:5px 10px; background:#FF3B30; font-size:12px;">清空</button>
        </div>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // 初始化
    window.onload = () => {
        document.getElementById('height').value = localStorage.getItem('userHeight') || '';
        renderHistory();
    };

    function saveHeight() {
        localStorage.setItem('userHeight', document.getElementById('height').value);
    }

    function addRecord() {
        const weight = document.getElementById('weight').value;
        const height = document.getElementById('height').value;
        if (!weight) return alert('請輸入體重');

        const record = {
            weight: weight,
            date: new Date().toLocaleDateString(),
            bmi: height ? (weight / ((height/100)**2)).toFixed(1) : null
        };

        let history = JSON.parse(localStorage.getItem('weightHistory') || '[]');
        history.unshift(record); // 加入到最前面
        localStorage.setItem('weightHistory', JSON.stringify(history));
        
        document.getElementById('weight').value = '';
        renderHistory();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('weightHistory') || '[]');
        const list = document.getElementById('historyList');
        list.innerHTML = history.length ? '' : '<p style="color:#8E8E93; text-align:center;">尚無紀錄</p>';
        
        history.forEach(item => {
            list.innerHTML += `
                <div class="history-item">
                    <div>
                        <div class="weight-val">${item.weight} kg</div>
                        <div class="date-val">${item.date}</div>
                    </div>
                    ${item.bmi ? `<div class="bmi-tag">BMI: ${item.bmi}</div>` : ''}
                </div>
            `;
        });
    }

    function clearAll() {
        if (confirm('確定要刪除所有紀錄嗎？')) {
            localStorage.removeItem('weightHistory');
            renderHistory();
        }
    }
</script>

</body>
</html>
