<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專業體脂紀錄 v2.3.2</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text-sec: #8E8E93; --tab-bg: rgba(255,255,255,0.95); --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1C1C1E; -webkit-tap-highlight-color: transparent; }
        .page { display: none; height: 100vh; overflow: hidden; box-sizing: border-box; }
        .page.active { display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: calc(env(safe-area-inset-top) + 15px) 20px 10px 20px; background: var(--bg); }
        .header h1 { font-size: 26px; margin: 0; font-weight: bold; }
        
        .content-scroll { flex: 1; overflow-y: auto; padding: 0 15px 120px 15px; }
        .toolbar { display: flex; gap: 10px; padding: 10px 15px; background: var(--bg); border-bottom: 0.5px solid #C6C6C8; }
        .btn-tool { background: var(--card); color: var(--primary); padding: 12px; font-size: 14px; border-radius: 12px; flex: 1; text-align: center; font-weight: 500; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 13px; color: var(--text-sec); margin-bottom: 6px; }
        
        /* 核心修正：統一輸入框寬度與對齊 */
        input { width: 100%; padding: 14px; border: 1px solid #E5E5EA; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #FAFAFA; outline: none; -webkit-appearance: none; }
        #rec-date { width: 100%; display: block; } /* 確保日期框佔滿卡片內寬度 */
        
        button { border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 14px; font-size: 17px; margin-top: 25px; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(85px + env(safe-area-inset-bottom)); background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding-top: 15px; border-top: 0.5px solid #C6C6C8; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); font-size: 11px; text-decoration: none; width: 33%; }
        .tab-item.active { color: var(--primary); font-weight: bold; }
        .tab-icon { font-size: 26px; margin-bottom: 6px; }

        .history-item { background: white; padding: 18px; border-radius: 14px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .history-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #F2F2F7; padding-bottom: 10px; align-items: center; }
        .history-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; color: #3A3A3C; font-size: 13px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { font-size: 12px; padding: 6px 10px; border-radius: 8px; font-weight: normal; }
        .edit-btn { background: #F2F2F7; color: var(--primary); }
        .del-btn { background: #FFE5E5; color: var(--danger); }
        .version-tag { text-align: center; color: #C7C7CC; font-size: 11px; margin-top: 30px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="page-input" class="page active">
    <div class="header">
        <h1 id="input-title">新紀錄</h1>
        <div style="background:white; padding:6px 12px; border-radius:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display:flex; align-items:center; gap:8px;">
            <label style="margin:0; font-size:13px; color:#1C1C1E;">身高</label>
            <input type="number" id="h" placeholder="cm" style="width:40px; padding:0; border:none; background:none; text-align:right; font-size:16px; font-weight:500;" onchange="ls('h',this.value)">
        </div>
    </div>
    <div class="content-scroll">
        <div class="card">
            <div style="margin-bottom: 20px;">
                <label>📅 紀錄日期</label>
                <input type="date" id="rec-date">
            </div>
            <div class="grid">
                <div class="input-group"><label>體重 (kg)</label><input type="number" step="0.1" id="w" placeholder="0.0"></div>
                <div class="input-group"><label>體脂肪 (%)</label><input type="number" step="0.1" id="fat" placeholder="0.0"></div>
                <div class="input-group"><label>內臟脂肪</label><input type="number" step="0.5" id="vfat" placeholder="0.0"></div>
                <div class="input-group"><label>骨骼筋 (%)</label><input type="number" step="0.1" id="muscle" placeholder="0.0"></div>
                <div class="input-group"><label>體年齡</label><input type="number" id="age" placeholder="25"></div>
                <div class="input-group"><label>基代 (kcal)</label><input type="number" id="bmr" placeholder="1500"></div>
            </div>
            <button id="save-btn" class="btn-save" onclick="save()">儲存數據</button>
            <button id="cancel-edit" style="display:none; width:100%; margin-top:10px; padding:12px; border-radius:12px; background:#E5E5EA;" onclick="resetForm()">取消修改</button>
        </div>
        <div class="version-tag" onclick="location.reload(true)">Build v2.3.2 • 點擊更新系統</div>
    </div>
</div>

<div id="page-chart" class="page">
    <div class="header"><h1>趨勢分析</h1></div>
    <div class="content-scroll">
        <div class="card" style="height: 400px;"><label>最近 10 次體重趨勢</label><div style="height:320px; margin-top:15px;"><canvas id="mainChart"></canvas></div></div>
    </div>
</div>

<div id="page-list" class="page">
    <div class="header"><h1>歷史紀錄</h1><button onclick="clearData()" style="background:none; color:var(--danger); font-size:14px;">清空</button></div>
    <div class="toolbar">
        <div class="btn-tool" onclick="exportExcel()">📤 匯出備份 (CSV)</div>
        <div class="btn-tool" style="position:relative;">📥 匯入紀錄<input type="file" id="importFile" accept=".csv" style="position:absolute; opacity:0; left:0; top:0; width:100%; height:100%;" onchange="importExcel(this)"></div>
    </div>
    <div id="history-contents" class="content-scroll" style="padding-top:15px;"></div>
</div>

<nav class="tab-bar">
    <a href="javascript:void(0)" class="tab-item active" onclick="showPage('input', this)"><div class="tab-icon">✍️</div><div>紀錄</div></a>
    <a href="javascript:void(0)" class="tab-item" onclick="showPage('chart', this)"><div class="tab-icon">📈</div><div>趨勢</div></a>
    <a href="javascript:void(0)" class="tab-item" onclick="showPage('list', this)"><div class="tab-icon">📜</div><div>詳細</div></a>
</nav>

<script>
    const ls = (k,v) => localStorage.setItem(k,v);
    const lg = (k) => localStorage.getItem(k);
    let weightChart, editIndex = -1;

    window.onload = () => {
        document.getElementById('h').value = lg('h') || '';
        document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
        initChart();
        renderHistory();
    };

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'chart') updateChart();
        if(pageId === 'list') renderHistory();
    }

    function save() {
        const hVal = document.getElementById('h').value;
        const wVal = parseFloat(document.getElementById('w').value);
        if(!wVal || !hVal) return alert("請填寫身高與體重");
        const data = {
            date: document.getElementById('rec-date').value,
            w: wVal,
            fat: document.getElementById('fat').value || '--',
            vfat: document.getElementById('vfat').value || '--',
            muscle: document.getElementById('muscle').value || '--',
            age: document.getElementById('age').value || '--',
            bmr: document.getElementById('bmr').value || '--',
            bmi: (wVal / ((hVal/100)**2)).toFixed(1)
        };
        let history = JSON.parse(lg('weights') || '[]');
        if(editIndex > -1) history[editIndex] = data;
        else history.push(data);
        history.sort((a, b) => new Date(b.date) - new Date(a.date));
        ls('weights', JSON.stringify(history));
        resetForm();
        alert("儲存成功");
    }

    function resetForm() {
        editIndex = -1;
        document.getElementById('input-title').innerText = "新紀錄";
        document.getElementById('save-btn').innerText = "儲存數據";
        document.getElementById('cancel-edit').style.display = "none";
        ['w','fat','vfat','muscle','age','bmr'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
    }

    function editItem(index) {
        const history = JSON.parse(lg('weights') || '[]');
        const item = history[index];
        editIndex = index;
        document.getElementById('input-title').innerText = "修改紀錄";
        document.getElementById('save-btn').innerText = "更新數據";
        document.getElementById('cancel-edit').style.display = "block";
        document.getElementById('rec-date').value = item.date;
        document.getElementById('w').value = item.w;
        document.getElementById('fat').value = item.fat === '--' ? '' : item.fat;
        document.getElementById('vfat').value = item.vfat === '--' ? '' : item.vfat;
        document.getElementById('muscle').value = item.muscle === '--' ? '' : item.muscle;
        document.getElementById('age').value = item.age === '--' ? '' : item.age;
        document.getElementById('bmr').value = item.bmr === '--' ? '' : item.bmr;
        showPage('input', document.querySelectorAll('.tab-item')[0]);
    }

    function deleteItem(index) {
        if(confirm("確定刪除此筆紀錄？")) {
            let history = JSON.parse(lg('weights') || '[]');
            history.splice(index, 1);
            ls('weights', JSON.stringify(history));
            renderHistory();
        }
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        weightChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#007AFF', tension: 0.4, fill: true, backgroundColor: 'rgba(0,122,255,0.08)', pointRadius: 5, pointBackgroundColor: '#007AFF' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function updateChart() {
        const history = JSON.parse(lg('weights') || '[]').slice(0, 10).reverse();
        weightChart.data.labels = history.map(i => i.date.split('-')[1] + '/' + i.date.split('-')[2]);
        weightChart.data.datasets[0].data = history.map(i => i.w);
        weightChart.update();
    }

    function renderHistory() {
        const history = JSON.parse(lg('weights') || '[]');
        const container = document.getElementById('history-contents');
        container.innerHTML = history.length ? '' : '<p style="text-align:center; color:#8E8E93; margin-top:50px;">無歷史紀錄</p>';
        history.forEach((i, idx) => {
            container.innerHTML += `
                <div class="history-item">
                    <div class="history-header">
                        <span>📅 ${i.date}</span>
                        <div class="action-btns">
                            <button class="action-btn edit-btn" onclick="editItem(${idx})">✏️ 修改</button>
                            <button class="action-btn del-btn" onclick="deleteItem(${idx})">🗑️ 刪除</button>
                        </div>
                    </div>
                    <div class="history-grid">
                        <span style="grid-column: span 3; color:var(--primary); font-weight:bold; font-size:16px; margin-bottom:5px;">${i.w} kg (BMI: ${i.bmi})</span>
                        <span>體脂: ${i.fat}%</span><span>內臟: ${i.vfat}</span><span>肌肉: ${i.muscle}%</span>
                        <span>體年齡: ${i.age}</span><span>基代: ${i.bmr}</span>
                    </div>
                </div>`;
        });
    }

    function exportExcel() {
        const history = JSON.parse(lg('weights') || '[]');
        if(!history.length) return alert("尚無數據");
        let csv = "\uFEFF日期,體重,BMI,體脂肪,內臟脂肪,骨骼筋,體年齡,基礎代謝\n";
        history.forEach(i => csv += `${i.date},${i.w},${i.bmi},${i.fat},${i.vfat},${i.muscle},${i.age},${i.bmr}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `體脂紀錄_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function importExcel(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let newHistory = [];
            for(let i=1; i<lines.length; i++) {
                const cols = lines[i].split(',');
                if(cols.length < 2) continue;
                newHistory.push({
                    date: cols[0], w: parseFloat(cols[1]), bmi: cols[2], fat: cols[3], 
                    vfat: cols[4], muscle: cols[5], age: cols[6], bmr: cols[7].trim()
                });
            }
            if(confirm(`偵測到 ${newHistory.length} 筆資料，是否與現有紀錄合併？`)) {
                let existing = JSON.parse(lg('weights') || '[]');
                let combined = [...existing, ...newHistory];
                combined.sort((a, b) => new Date(b.date) - new Date(a.date));
                ls('weights', JSON.stringify(combined));
                renderHistory();
                alert("匯入完成");
            }
        };
        reader.readAsText(file);
    }

    function clearData() { if(confirm("確定永久刪除所有紀錄？")) { ls('weights', '[]'); renderHistory(); } }
</script>
</body>
</html>
